cartpole1:
  env_id: CartPole-v1
  replay_memory_size: 500000
  mini_batch_size: 64
  epsilon_init: 1.0
  epsilon_decay: 0.9995
  epsilon_min: 0.01
  network_sync_rate: 1000
  learning_rate_a: 0.0001
  discount_factor_g: 0.99
  stop_on_reward: 100000
  fc1_nodes: 64
  # CartPole benefits from larger network and slower epsilon decay

flappybird:
  env_id: FlappyBird-v0
  replay_memory_size: 1000000
  mini_batch_size: 64
  epsilon_init: 1.0
  epsilon_decay: 0.9999
  epsilon_min: 0.01
  network_sync_rate: 5000
  learning_rate_a: 0.00025
  discount_factor_g: 0.99
  stop_on_reward: 100000
  fc1_nodes: 128
  env_make_params:
    use_lidar: False
  # FlappyBird needs larger network due to higher complexity